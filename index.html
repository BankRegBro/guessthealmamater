<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROLL CALL &mdash; Guess the Alma Mater</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Press+Start+2P&family=Russo+One&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a16; --bg-2:#11112a; --panel:#15163a; --panel-2:#1c1d4a;
    --cyan:#19e0ff; --magenta:#ff2e9a; --yellow:#ffd400; --orange:#ff7b1a;
    --green:#39ff6a; --red:#ff3b46; --ink:#0a0a16; --txt:#eaf6ff; --muted:#9a9ddb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Russo One',sans-serif;color:var(--txt);
    background:radial-gradient(120% 90% at 50% -10%, #1a1b4d 0%, var(--bg) 62%),var(--bg);
    min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
    padding:26px 14px 70px;position:relative;overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:linear-gradient(rgba(25,224,255,.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,46,154,.08) 1px, transparent 1px);
    background-size:42px 42px,42px 42px;
    -webkit-mask-image:radial-gradient(120% 80% at 50% 30%, #000 30%, transparent 85%);
            mask-image:radial-gradient(120% 80% at 50% 30%, #000 30%, transparent 85%);
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:50;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px),
      radial-gradient(120% 100% at 50% 50%, transparent 60%, rgba(0,0,0,.55) 100%);
  }
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0 0 0 0);white-space:nowrap;border:0}
  .wrap{width:100%;max-width:720px;position:relative;z-index:1}

  /* ---------- View toggle ---------- */
  .viewtoggle{position:fixed;top:12px;right:12px;z-index:100;display:flex;
    background:var(--ink);border:2px solid var(--cyan);border-radius:7px;overflow:hidden;
    box-shadow:0 0 12px rgba(25,224,255,.4)}
  .viewtoggle button{font-family:'Russo One',sans-serif;font-size:.8rem;letter-spacing:.04em;
    text-transform:uppercase;color:var(--cyan);background:transparent;border:none;
    padding:8px 13px;cursor:pointer}
  .viewtoggle button.on{background:var(--cyan);color:var(--ink)}

  /* ---------- Masthead ---------- */
  .masthead{text-align:center;margin-bottom:18px}
  .coin{font-family:'Press Start 2P',monospace;font-size:.72rem;letter-spacing:.12em;
    color:var(--cyan);margin-bottom:14px;animation:blink 1.1s steps(1) infinite;
    text-shadow:0 0 8px rgba(25,224,255,.8)}
  @keyframes blink{50%{opacity:.15}}
  .title{font-family:'Anton',sans-serif;font-size:clamp(3.2rem,13vw,6rem);line-height:.82;
    letter-spacing:.01em;color:var(--yellow);transform:skewX(-7deg);display:inline-block;
    text-shadow:3px 3px 0 var(--magenta),5px 5px 0 var(--magenta),7px 7px 0 #7a0048,9px 9px 0 #7a0048,0 0 26px rgba(25,224,255,.55)}
  .tagline{font-family:'Press Start 2P',monospace;font-size:.72rem;letter-spacing:.16em;
    color:var(--magenta);margin-top:16px;text-shadow:0 0 10px rgba(255,46,154,.6)}

  /* ---------- Cabinet / card ---------- */
  .card{background:linear-gradient(180deg,var(--panel),var(--bg-2));
    border:3px solid var(--cyan);border-radius:8px;padding:26px 22px 24px;position:relative;
    box-shadow:0 0 0 3px var(--ink),0 0 22px rgba(25,224,255,.35),0 24px 50px -26px #000}
  .hdr{font-family:'Press Start 2P',monospace;font-size:.78rem;letter-spacing:.12em;
    color:var(--yellow);text-align:center;margin-bottom:18px;text-shadow:0 0 8px rgba(255,212,0,.5)}

  /* ---------- Difficulty ---------- */
  .seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:20px}
  .seg button{font-family:'Anton',sans-serif;font-size:1.18rem;letter-spacing:.02em;
    color:var(--cyan);background:var(--panel-2);border:2px solid var(--cyan);border-radius:5px;
    padding:14px 6px 12px;cursor:pointer;transition:.12s;line-height:1;
    box-shadow:4px 4px 0 var(--ink);text-transform:uppercase}
  .seg button small{display:block;font-family:'Russo One',sans-serif;font-size:.7rem;
    line-height:1.3;color:var(--muted);margin-top:9px;letter-spacing:.02em;text-transform:none}
  .seg button:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);
    text-shadow:0 0 10px rgba(25,224,255,.8)}
  .seg button.on{background:var(--cyan);color:var(--ink);border-color:var(--cyan);box-shadow:4px 4px 0 var(--magenta)}
  .seg button.on small{color:#08384a}

  .arcade-btn{width:100%;font-family:'Anton',sans-serif;font-size:1.9rem;letter-spacing:.05em;
    color:var(--ink);background:var(--yellow);border:none;border-radius:6px;padding:15px;cursor:pointer;
    text-transform:uppercase;transition:.1s;
    box-shadow:0 0 0 3px var(--ink),0 6px 0 var(--orange),0 0 22px rgba(255,212,0,.5)}
  .arcade-btn:hover{filter:brightness(1.05)}
  .arcade-btn:active{transform:translateY(4px);box-shadow:0 0 0 3px var(--ink),0 2px 0 var(--orange)}

  #bestNote{text-align:center;font-family:'Press Start 2P',monospace;font-size:.66rem;
    color:var(--yellow);letter-spacing:.05em;margin-top:16px;text-shadow:0 0 8px rgba(255,212,0,.4);line-height:1.6}
  .fineprint{text-align:center;color:var(--muted);font-family:'Russo One',sans-serif;
    font-size:.82rem;letter-spacing:.03em;margin-top:12px;line-height:1.7}
  .fineprint b{color:var(--cyan);font-weight:400}

  /* ---------- HUD ---------- */
  .hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;position:relative}
  .stat{background:var(--ink);border:2px solid var(--panel-2);border-radius:5px;padding:9px 6px;text-align:center}
  .stat .lab{font-family:'Press Start 2P',monospace;font-size:.6rem;letter-spacing:.06em;color:var(--muted)}
  .stat .val{font-family:'Press Start 2P',monospace;font-size:1.05rem;margin-top:9px;color:var(--txt)}
  .stat.score .val{color:var(--cyan);text-shadow:0 0 8px rgba(25,224,255,.7)}
  .stat.streak .val{color:var(--muted)}
  body.onfire .stat.streak{border-color:var(--orange);animation:firepulse .5s infinite alternate}
  body.onfire .stat.streak .val{color:var(--orange)}
  body.onfire .stat.streak .lab{color:var(--yellow)}
  @keyframes firepulse{from{box-shadow:0 0 4px rgba(255,123,26,.4)}to{box-shadow:0 0 16px rgba(255,123,26,.95)}}
  .fire-tag{position:absolute;top:-15px;left:50%;transform:translateX(-50%);
    font-family:'Anton',sans-serif;font-size:.85rem;letter-spacing:.12em;color:var(--ink);
    background:linear-gradient(180deg,var(--yellow),var(--orange));padding:2px 12px;border-radius:4px;
    box-shadow:0 0 14px rgba(255,123,26,.9);opacity:0;transition:.18s;text-transform:uppercase;z-index:5}
  body.onfire .fire-tag{opacity:1}

  .meter{height:12px;background:var(--ink);border:2px solid var(--panel-2);border-radius:4px;
    overflow:hidden;margin-bottom:20px;position:relative}
  .meter > i{position:absolute;inset:0;width:0;transition:width .35s ease;
    background:linear-gradient(90deg,var(--cyan),var(--magenta));
    -webkit-mask-image:repeating-linear-gradient(90deg,#000 0 7px,transparent 7px 9px);
            mask-image:repeating-linear-gradient(90deg,#000 0 7px,transparent 7px 9px)}

  /* ---------- Prompt ---------- */
  .prompt{text-align:center;margin-bottom:18px}
  .badges{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .chip{font-family:'Press Start 2P',monospace;font-size:.62rem;letter-spacing:.06em;
    color:var(--ink);padding:8px 13px;border-radius:4px;box-shadow:0 0 0 2px var(--ink),3px 3px 0 var(--ink)}
  .chip-lg{font-family:'Press Start 2P',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;
    background:var(--ink);padding:8px 12px;border-radius:4px;border:2px solid var(--cyan);
    color:var(--cyan);box-shadow:3px 3px 0 var(--ink)}
  .ask{font-family:'Russo One',sans-serif;font-size:.92rem;letter-spacing:.03em;text-transform:uppercase;
    color:var(--muted);margin-bottom:12px}
  .athlete{font-family:'Anton',sans-serif;font-size:clamp(2.2rem,8.5vw,3.5rem);line-height:1.04;
    letter-spacing:.02em;text-transform:uppercase;color:#fff;
    text-shadow:0 3px 0 #07071c,0 0 2px #07071c,0 0 16px rgba(25,224,255,.38)}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .opt{font-family:'Russo One',sans-serif;font-size:.96rem;text-align:left;color:var(--txt);
    background:var(--panel-2);border:2px solid #3a3c84;border-radius:5px;padding:13px 13px;cursor:pointer;
    transition:.1s;display:flex;align-items:center;gap:11px;box-shadow:3px 3px 0 var(--ink);
    opacity:0;transform:translateY(7px);animation:rise .3s forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .crest{font-family:'Anton',sans-serif;font-size:.76rem;letter-spacing:0;width:44px;height:44px;flex:none;
    display:grid;place-items:center;border-radius:7px;border:2px solid;text-transform:uppercase;line-height:1;
    overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .crest-none{background:#23254f;color:var(--muted);border-color:#3a3c84;font-size:1.1rem}
  .opt-name{flex:1 1 auto;min-width:0}
  .keycap{font-family:'Press Start 2P',monospace;font-size:.62rem;color:var(--muted);
    border:1px solid #3a3c84;border-radius:4px;padding:5px 6px;flex:none}
  .opt:hover:not(:disabled){border-color:var(--cyan);transform:translate(-2px,-2px);
    box-shadow:5px 5px 0 var(--ink);text-shadow:0 0 8px rgba(25,224,255,.7)}
  .opt:disabled{cursor:default}
  .opt.correct{background:rgba(57,255,106,.30);border-color:var(--green);box-shadow:3px 3px 0 var(--ink),0 0 18px rgba(57,255,106,.7)}
  .opt.correct .keycap{border-color:var(--green);color:var(--green)}
  .opt.wrong{background:rgba(255,59,70,.18);border-color:var(--red);box-shadow:3px 3px 0 var(--ink),0 0 16px rgba(255,59,70,.55)}
  .opt.wrong .keycap{border-color:var(--red);color:var(--red)}
  .opt.dim{opacity:.4}

  .next-row{margin-top:18px;min-height:54px;display:flex;align-items:center;justify-content:space-between;
    gap:12px;flex-wrap:wrap}
  .verdict{font-family:'Anton',sans-serif;font-size:1.5rem;letter-spacing:.04em;opacity:0;transition:.15s;
    transform:skewX(-6deg);text-transform:uppercase;flex:1 1 auto;min-width:0}
  .verdict.show{opacity:1;animation:pop .28s}
  @keyframes pop{0%{transform:skewX(-6deg) scale(.6)}60%{transform:skewX(-6deg) scale(1.12)}100%{transform:skewX(-6deg) scale(1)}}
  .verdict.hit{color:var(--green);text-shadow:0 0 14px rgba(57,255,106,.7)}
  .verdict.miss{color:var(--red);text-shadow:0 0 14px rgba(255,59,70,.7)}
  .next-btn{font-family:'Anton',sans-serif;font-size:1.3rem;letter-spacing:.04em;color:var(--ink);
    background:var(--cyan);border:none;border-radius:5px;padding:10px 24px;cursor:pointer;text-transform:uppercase;
    box-shadow:0 0 0 2px var(--ink),0 4px 0 #0e93ad;opacity:0;pointer-events:none;transition:.1s;flex:0 0 auto}
  .next-btn.show{opacity:1;pointer-events:auto}
  .next-btn:active{transform:translateY(3px);box-shadow:0 0 0 2px var(--ink),0 1px 0 #0e93ad}

  .card.shake{animation:shake .35s}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}
    30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
  .card.flash{animation:flash .35s}
  @keyframes flash{0%{box-shadow:0 0 0 3px var(--ink),0 0 22px rgba(25,224,255,.35)}
    45%{box-shadow:0 0 0 3px var(--green),0 0 26px rgba(57,255,106,.45)}
    100%{box-shadow:0 0 0 3px var(--ink),0 0 22px rgba(25,224,255,.35)}}

  /* ---------- Results ---------- */
  .final{text-align:center;padding:6px 0 2px}
  .final .stars{font-family:'Press Start 2P',monospace;color:var(--yellow);font-size:.8rem;letter-spacing:.3em;margin-bottom:6px}
  .grade{font-family:'Anton',sans-serif;font-size:clamp(3.8rem,16vw,6.4rem);line-height:.8;color:var(--yellow);
    transform:skewX(-7deg);display:inline-block;text-shadow:3px 3px 0 var(--magenta),5px 5px 0 #7a0048,0 0 26px rgba(255,212,0,.5)}
  .outof{font-family:'Anton',sans-serif;font-size:1.7rem;color:var(--muted);display:block;margin-top:6px}
  .verdict-big{font-family:'Press Start 2P',monospace;font-size:.82rem;letter-spacing:.06em;margin-top:14px;
    color:var(--cyan);text-shadow:0 0 12px rgba(25,224,255,.6);line-height:1.6}
  .meta{font-family:'Press Start 2P',monospace;color:var(--muted);font-size:.62rem;letter-spacing:.05em;margin-top:12px}
  #hiFlag{margin-top:12px}
  .hi-flag{font-family:'Press Start 2P',monospace;font-size:.74rem;color:var(--yellow);letter-spacing:.08em;
    text-shadow:0 0 12px rgba(255,212,0,.8);animation:blink 1s steps(1) infinite}
  .best-line{font-family:'Press Start 2P',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.05em}
  .review{margin-top:22px}
  .review h3{font-family:'Press Start 2P',monospace;font-size:.7rem;letter-spacing:.06em;color:var(--magenta);
    margin-bottom:10px;border-top:2px solid #2a2c66;border-bottom:2px solid #2a2c66;padding:11px 0;text-align:center;line-height:1.6}
  .miss-row{display:flex;justify-content:space-between;gap:14px;padding:10px 2px;border-bottom:1px solid #23254f;font-size:.94rem}
  .miss-row:last-child{border-bottom:none}
  .miss-row .who span{display:block;font-family:'Russo One',sans-serif;font-size:.72rem;color:var(--muted);margin-top:5px;letter-spacing:.03em}
  .miss-row .ans{text-align:right;flex:none}
  .miss-row .ans .right{color:var(--green);text-shadow:0 0 8px rgba(57,255,106,.5)}
  .miss-row .ans .gave{color:var(--red);font-size:.78rem;margin-top:3px}
  .allright{text-align:center;color:var(--green);padding:12px 0;text-shadow:0 0 10px rgba(57,255,106,.6)}
  .again-btn{margin-top:22px}
  .linkbtn{display:block;margin:14px auto 0;background:none;border:none;cursor:pointer;
    font-family:'Russo One',sans-serif;font-size:.82rem;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  .linkbtn:hover{color:var(--cyan)}

  /* ---------- Leaderboard ---------- */
  .lb-wrap{margin-top:22px}
  .lb-entry{margin-bottom:14px;text-align:center}
  .lb-entry-label{font-family:'Press Start 2P',monospace;font-size:.58rem;color:var(--yellow);
    letter-spacing:.05em;margin-bottom:12px;line-height:1.6;text-shadow:0 0 8px rgba(255,212,0,.4)}
  .lb-entry-row{display:flex;gap:10px;justify-content:center;align-items:stretch}
  .lb-input{font-family:'Press Start 2P',monospace;font-size:1.05rem;letter-spacing:.32em;
    text-transform:uppercase;text-align:center;width:140px;color:var(--cyan);background:var(--ink);
    border:2px solid var(--cyan);border-radius:5px;padding:12px 6px 10px 12px;
    box-shadow:3px 3px 0 var(--ink);caret-color:var(--cyan)}
  .lb-input::placeholder{color:#3a3c84}
  .lb-submit{font-family:'Anton',sans-serif;font-size:1.15rem;letter-spacing:.04em;color:var(--ink);
    background:var(--yellow);border:none;border-radius:5px;padding:0 20px;cursor:pointer;text-transform:uppercase;
    box-shadow:0 0 0 2px var(--ink),0 4px 0 var(--orange)}
  .lb-submit:active{transform:translateY(3px);box-shadow:0 0 0 2px var(--ink),0 1px 0 var(--orange)}
  .lb-submit:disabled{opacity:.5;cursor:default}
  .lb-board{border:2px solid #2a2c66;border-radius:6px;overflow:hidden}
  .lb-title{font-family:'Press Start 2P',monospace;font-size:.6rem;letter-spacing:.06em;color:var(--magenta);
    text-align:center;padding:11px 6px;background:var(--ink);border-bottom:2px solid #2a2c66;line-height:1.6}
  .lb-row{display:flex;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid #1c1d4a}
  .lb-row:last-child{border-bottom:none}
  .lb-row .rk{font-family:'Press Start 2P',monospace;font-size:.58rem;color:var(--muted);width:26px;flex:none}
  .lb-row .ini{font-family:'Press Start 2P',monospace;font-size:.72rem;color:var(--cyan);letter-spacing:.12em;flex:1 1 auto}
  .lb-row .sc{font-family:'Press Start 2P',monospace;font-size:.72rem;color:var(--yellow);flex:none}
  .lb-row.me{background:rgba(57,255,106,.14)}
  .lb-row.me .ini{color:var(--green)}
  .lb-empty,.lb-msg{font-family:'Russo One',sans-serif;color:var(--muted);text-align:center;padding:15px;font-size:.9rem}

  /* ---------- Focus states ---------- */
  .opt:focus-visible,.seg button:focus-visible,.arcade-btn:focus-visible,.next-btn:focus-visible,
  .viewtoggle button:focus-visible,.linkbtn:focus-visible{outline:3px solid var(--yellow);outline-offset:2px}

  /* ---------- Mobile view (default) ---------- */
  body.mobileview{padding-top:54px}
  body.mobileview .options{grid-template-columns:1fr}
  body.mobileview .seg{grid-template-columns:1fr}
  body.mobileview .title{font-size:3.2rem}
  body.mobileview .athlete{font-size:2rem}
  body.mobileview .opt{padding:15px 14px}
  /* Phone-frame bezel only as a desktop preview; real phones render full-width */
  @media (min-width:600px){
    body.mobileview .wrap{max-width:392px;background:#05050d;border:12px solid #05050d;border-radius:38px;
      padding:18px 12px 24px;position:relative;
      box-shadow:0 0 0 2px #2a2c66,0 0 26px rgba(25,224,255,.18),0 30px 60px -22px #000}
    body.mobileview .wrap::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
      width:120px;height:18px;background:#05050d;border-radius:0 0 14px 14px;z-index:6}
  }

  /* ---------- Real small screens ---------- */
  @media(max-width:540px){.options{grid-template-columns:1fr}.seg{grid-template-columns:1fr}}

  /* ---------- Reduced motion ---------- */
  @media (prefers-reduced-motion: reduce){
    .coin,.hi-flag{animation:none}
    body.onfire .stat.streak{animation:none;box-shadow:0 0 12px rgba(255,123,26,.7)}
    .card.shake,.card.flash{animation:none}
    .verdict.show{animation:none}
    .opt{opacity:1;transform:none;animation:none}
  }
  .hidden{display:none}
</style>
</head>
<body class="mobileview">

<div class="viewtoggle" id="viewToggle" role="group" aria-label="Layout view">
  <button data-view="desktop">Desktop</button>
  <button data-view="mobile" class="on">Mobile</button>
</div>

<div class="wrap">

  <div class="masthead">
    <div class="coin">&#9656; INSERT COIN &#9666;</div>
    <div class="title">ROLL CALL</div>
    <div class="tagline">GUESS THE ALMA MATER</div>
  </div>

  <!-- START -->
  <section id="startScreen" class="card">
    <div class="hdr">LEAGUE</div>
    <div class="seg" id="leagueSeg">
      <button data-league="all" class="on">ALL<small>Every sport</small></button>
      <button data-league="nfl">NFL<small>Football</small></button>
      <button data-league="nba">NBA<small>Hoops</small></button>
    </div>
    <div class="hdr">SELECT DIFFICULTY</div>
    <div class="seg" id="diffSeg">
      <button data-diff="mainstream" class="on">ROOKIE<small>Big names only</small></button>
      <button data-diff="mixed">PRO<small>Everybody in</small></button>
      <button data-diff="deepcut">ALL-PRO<small>Deep cuts</small></button>
    </div>
    <button class="arcade-btn" id="startBtn">PRESS START</button>
    <div id="bestNote"></div>
    <div class="fineprint" id="poolNote"></div>
    <div class="fineprint">Tip: use keys <b>A&ndash;F</b> or <b>1&ndash;6</b> to answer, <b>Enter</b> to advance.</div>
  </section>

  <!-- QUIZ -->
  <section id="quizScreen" class="card hidden">
    <div class="hud">
      <div class="fire-tag">&#9650; ON FIRE &#9650;</div>
      <div class="stat"><div class="lab">PLAY</div><div class="val"><span id="qNum">1</span>/<span id="qTot">20</span></div></div>
      <div class="stat score"><div class="lab">SCORE</div><div class="val" id="scoreVal">0</div></div>
      <div class="stat streak"><div class="lab">STREAK</div><div class="val" id="streakVal">0</div></div>
    </div>
    <div class="meter"><i id="progFill"></i></div>

    <div class="prompt">
      <div class="badges">
        <span class="chip" id="sportBadge">SPORT</span>
        <span class="chip-lg" id="leagueBadge">LEAGUE</span>
      </div>
      <div class="ask">Where did they play college?</div>
      <div class="athlete" id="athleteName">&mdash;</div>
    </div>

    <div class="options" id="options"></div>

    <div class="next-row">
      <div class="verdict" id="verdict" aria-hidden="true"></div>
      <button class="next-btn" id="nextBtn">NEXT &rsaquo;</button>
    </div>
    <div id="srStatus" class="sr-only" aria-live="assertive"></div>
  </section>

  <!-- RESULTS -->
  <section id="resultsScreen" class="card hidden">

/* ---------- helpers ---------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function sample(arr,k){ return shuffle(arr).slice(0,k); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function buildOptions(ath, recent){
  const correct = ath.c;
  const candidates = POOLS[ath.s].filter(c => c !== correct);
  const need = 5;
  // Only offer "No U.S. college" as a decoy sometimes, and not if it was just shown
  const useNone = (correct !== NONE) && !recent.includes(NONE) && (Math.random() < 0.4);
  const schoolsNeeded = useNone ? need - 1 : need;
  // Prefer schools not shown recently; fall back to the rest if a pool is small
  const fresh = candidates.filter(c => !recent.includes(c));
  const stale = candidates.filter(c => recent.includes(c));
  let picks = sample(fresh, Math.min(schoolsNeeded, fresh.length));
  if(picks.length < schoolsNeeded) picks = picks.concat(sample(stale, schoolsNeeded - picks.length));
  const distractors = useNone ? [...picks, NONE] : picks;
  // Record what was shown so it cools down for the next few questions
  picks.forEach(s => recent.push(s));
  if(correct === NONE || useNone) recent.push(NONE);
  if(correct !== NONE) recent.push(correct);
  while(recent.length > 22) recent.shift();
  return shuffle([correct, ...distractors]);
}

/* ---------- storage (safe) ---------- */
function bestKey(){ return 'rollcall_best_'+league+'_'+diff; }
function getBest(){ try{ return parseInt(localStorage.getItem(bestKey())||'0',10)||0; }catch(e){ return 0; } }
function setBest(v){ try{ localStorage.setItem(bestKey(), String(v)); }catch(e){} }

/* ---------- state ---------- */
let diff = "mainstream";
let league = "all";
let round = [];
let idx = 0, score = 0, streak = 0, answered = false;
let misses = [];

const $ = id => document.getElementById(id);
const startScreen = $("startScreen"), quizScreen = $("quizScreen"), resultsScreen = $("resultsScreen");

function currentPool(){
  let pool = ATHLETES.slice();
  if(diff==="mainstream") pool = pool.filter(a=>a.t==="main");
  else if(diff==="deepcut") pool = pool.filter(a=>a.t==="deep");
  if(league==="nfl") pool = pool.filter(a=>a.s==="football");
  else if(league==="nba") pool = pool.filter(a=>a.s==="basketball");
  return pool;
}
function roundLen(){ return Math.min(QUESTIONS_PER_ROUND, currentPool().length); }
function diffLabel(){ return diff==="mainstream" ? "ROOKIE" : diff==="deepcut" ? "ALL-PRO" : "PRO"; }
function comboLabel(){ return (league==="all" ? "" : league.toUpperCase()+" \u00b7 ") + diffLabel(); }
function updatePoolNote(){ $("poolNote").textContent = `${currentPool().length} athletes loaded \u00b7 ${roundLen()} per game`; }
function updateBest(){
  const b = getBest(), N = roundLen();
  $("bestNote").textContent = b>0 ? `BEST (${comboLabel()}): ${b}/${N}` : `NO HIGH SCORE YET \u2014 ${comboLabel()}`;
}

/* difficulty selector */
$("diffSeg").querySelectorAll("button").forEach(b=>{
  b.addEventListener("click",()=>{
    $("diffSeg").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    diff = b.dataset.diff;
    try{ localStorage.setItem('rollcall_diff', diff); }catch(e){}
    updatePoolNote(); updateBest();
  });
});

/* league selector */
$("leagueSeg").querySelectorAll("button").forEach(b=>{
  b.addEventListener("click",()=>{
    $("leagueSeg").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    league = b.dataset.league;
    try{ localStorage.setItem('rollcall_league', league); }catch(e){}
    updatePoolNote(); updateBest();
  });
});

/* view toggle */
function setView(v){
  document.body.classList.toggle('mobileview', v==='mobile');
  $("viewToggle").querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.view===v));
  try{ localStorage.setItem('rollcall_view', v); }catch(e){}
}
$("viewToggle").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view)));

/* flow */
$("startBtn").addEventListener("click", startRound);
$("againBtn").addEventListener("click", startRound);
$("changeDivBtn").addEventListener("click", ()=>{
  resultsScreen.classList.add("hidden");
  startScreen.classList.remove("hidden");
  updatePoolNote(); updateBest();
});

function startRound(){
  const pool = currentPool();
  const recent = [];
  round = sample(pool, Math.min(QUESTIONS_PER_ROUND, pool.length)).map(a=>({ ath:a, options:buildOptions(a, recent) }));
  $("qTot").textContent = round.length;
  idx = 0; score = 0; streak = 0; misses = [];
  document.body.classList.remove("onfire");
  startScreen.classList.add("hidden");
  resultsScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  renderQuestion();
}

function renderQuestion(){
  answered = false;
  const q = round[idx];
  const meta = SPORT_META[q.ath.s];

  $("qNum").textContent = idx+1;
  $("scoreVal").textContent = score;
  $("streakVal").textContent = streak;
  $("progFill").style.width = (idx / round.length * 100) + "%";

  const badge = $("sportBadge");
  badge.textContent = meta.label;
  badge.style.background = meta.color;
  const lg = $("leagueBadge");
  lg.textContent = leagueFor(q.ath);
  lg.style.color = meta.color;
  lg.style.borderColor = meta.color;
  $("athleteName").textContent = q.ath.n;

  const verdict = $("verdict");
  verdict.className = "verdict"; verdict.textContent = "";
  $("srStatus").textContent = "";
  $("nextBtn").classList.remove("show");

  const box = $("options");
  box.innerHTML = "";
  q.options.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.style.animationDelay = (i*0.035)+"s";
    btn.setAttribute("aria-label", LETTERS[i]+": "+opt);
    const sc = SCHOOLS[opt];
    const crest = sc
      ? `<span class="crest" style="background:${sc[1]};color:${sc[2]};border-color:${sc[2]}">${sc[0]}</span>`
      : `<span class="crest crest-none">&mdash;</span>`;
    btn.innerHTML = `${crest}<span class="opt-name">${opt}</span><span class="keycap">${LETTERS[i]}</span>`;
    btn.addEventListener("click", ()=>choose(btn, opt, q));
    box.appendChild(btn);
  });
}

function choose(btn, opt, q){
  if(answered) return;
  answered = true;
  const correct = q.ath.c;
  [...$("options").querySelectorAll(".opt")].forEach(b=>{
    b.disabled = true;
    const label = b.querySelector(".opt-name").textContent;
    if(label === correct) b.classList.add("correct");
    else if(b === btn) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  const verdict = $("verdict");
  if(opt === correct){
    score++; streak++;
    verdict.textContent = streak>=3 ? `ON FIRE x${streak}!` : pick(CORRECT_WORDS);
    verdict.classList.add("verdict","hit","show");
    if(streak>=3) document.body.classList.add("onfire");
    $("srStatus").textContent = `Correct. ${q.ath.n}: ${correct}.`;
    flashCard("flash");
  } else {
    streak = 0;
    verdict.textContent = pick(WRONG_WORDS);
    verdict.classList.add("verdict","miss","show");
    document.body.classList.remove("onfire");
    misses.push({name:q.ath.n, sport:SPORT_META[q.ath.s].label, correct, gave:opt});
    $("srStatus").textContent = `Wrong. The answer is ${correct}.`;
    flashCard("shake");
  }
  $("scoreVal").textContent = score;
  $("streakVal").textContent = streak;
  $("progFill").style.width = ((idx+1) / round.length * 100) + "%";

  const nextBtn = $("nextBtn");
  nextBtn.textContent = (idx === round.length-1) ? "FINAL \u203a" : "NEXT \u203a";
  nextBtn.classList.add("show");
  nextBtn.focus();
}

function flashCard(cls){
  quizScreen.classList.remove("flash","shake");
  void quizScreen.offsetWidth;
  quizScreen.classList.add(cls);
  setTimeout(()=>quizScreen.classList.remove(cls), 450);
}

$("nextBtn").addEventListener("click", advance);
function advance(){
  if(!answered) return;
  idx++;
  if(idx >= round.length) showResults();
  else renderQuestion();
}

function showResults(){
  quizScreen.classList.add("hidden");
  resultsScreen.classList.remove("hidden");
  $("progFill").style.width = "100%";

  const total = round.length;
  $("finalScore").textContent = score;
  document.querySelector(".outof").textContent = " / " + total;

  const pct = Math.round(score/total*100);
  $("finalMeta").textContent = `${pct}% \u00b7 ${comboLabel()}`;

  const v = $("finalVerdict");
  if(pct===100) v.textContent="PERFECT GAME \u2014 HALL OF FAME";
  else if(pct>=80) v.textContent="M V P";
  else if(pct>=60) v.textContent="ALL-STAR";
  else if(pct>=40) v.textContent="ROLE PLAYER";
  else v.textContent="PRACTICE SQUAD";

  const prev = getBest();
  const isHigh = score > prev;
  if(isHigh) setBest(score);
  const flag = $("hiFlag");
  if(isHigh && score>0){ flag.className=""; flag.innerHTML = `<div class="hi-flag">\u2605 NEW HIGH SCORE \u2605</div>`; }
  else { flag.className=""; flag.innerHTML = `<div class="best-line">BEST (${comboLabel()}): ${Math.max(prev,score)}/${total}</div>`; }

  const list = $("missList");
  if(misses.length===0){
    $("reviewHead").textContent = "FLAWLESS VICTORY";
    list.innerHTML = `<div class="allright">NO MISSES. RESPECT.</div>`;
  } else {
    $("reviewHead").textContent = `THE ONES THAT GOT AWAY (${misses.length})`;
    list.innerHTML = misses.map(m=>`
      <div class="miss-row">
        <div class="who">${m.name}<span>${m.sport}</span></div>
        <div class="ans"><div class="right">${m.correct}</div><div class="gave">you said: ${m.gave}</div></div>
      </div>`).join("");
  }
  lbShow();
  if(!lbEnabled() || score<=0) $("againBtn").focus();
}

/* ---------- leaderboard ---------- */
const LB = LEADERBOARD_API.replace(/\/+$/,"");
function lbEnabled(){ return LB.length > 0; }
async function lbFetchTop(){
  const r = await fetch(`${LB}/top?league=${league}&division=${diff}&limit=15`);
  if(!r.ok) throw new Error("http");
  return (await r.json()).top || [];
}
async function lbPost(initials){
  const r = await fetch(`${LB}/score`, { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ initials, score, league, division: diff }) });
  if(!r.ok) throw new Error("http");
  return r.json();
}
function lbMessage(msg){ $("lbBoard").innerHTML = `<div class="lb-title">Leaderboard</div><div class="lb-msg">${msg}</div>`; }
function renderBoard(top, mine){
  const head = `<div class="lb-title">Leaderboard \u2014 ${comboLabel()}</div>`;
  if(!top || !top.length){ $("lbBoard").innerHTML = head + `<div class="lb-empty">No scores yet \u2014 be the first.</div>`; return; }
  const rows = top.map((e,i)=>{
    const isMe = mine && e.initials===mine.initials && e.score===mine.score && (i+1)===mine.rank;
    return `<div class="lb-row${isMe?" me":""}"><span class="rk">${i+1}</span><span class="ini">${e.initials}</span><span class="sc">${e.score}</span></div>`;
  }).join("");
  $("lbBoard").innerHTML = head + rows;
}
async function lbShow(){
  if(!lbEnabled()){ $("lbWrap").classList.add("hidden"); return; }
  $("lbWrap").classList.remove("hidden");
  const entry = $("lbEntry");
  if(score > 0){ entry.classList.remove("hidden"); $("lbInitials").value=""; $("lbSubmit").disabled=false; $("lbInitials").focus(); }
  else entry.classList.add("hidden");
  lbMessage("Loading\u2026");
  try{ renderBoard(await lbFetchTop(), null); }
  catch(e){ lbMessage("Leaderboard offline."); }
}
async function lbSubmitNow(){
  const ini = ($("lbInitials").value||"").toUpperCase().replace(/[^A-Z]/g,"").slice(0,3);
  if(ini.length < 1){ $("lbInitials").focus(); return; }
  $("lbSubmit").disabled = true;
  lbMessage("Saving\u2026");
  try{
    const res = await lbPost(ini);
    $("lbEntry").classList.add("hidden");
    renderBoard(res.top || [], { initials: ini, score, rank: res.rank });
  }catch(e){ lbMessage("Couldn\u2019t save \u2014 try again later."); $("lbSubmit").disabled = false; }
}
$("lbSubmit").addEventListener("click", lbSubmitNow);
$("lbInitials").addEventListener("input", function(){ this.value = this.value.toUpperCase().replace(/[^A-Z]/g,"").slice(0,3); });
$("lbInitials").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); lbSubmitNow(); } });

/* ---------- keyboard ---------- */
document.addEventListener("keydown", e=>{
  if(!quizScreen.classList.contains("hidden")){
    const k = e.key.toLowerCase();
    if(!answered){
      let i = -1;
      if(k>='1' && k<='6') i = (+k) - 1;
      else if(k>='a' && k<='f') i = k.charCodeAt(0) - 97;
      if(i>=0){ const btns=$("options").children; if(btns[i]){ e.preventDefault(); btns[i].click(); } }
    } else if(e.key==="Enter" || e.key===" " || k==="n" || e.key==="ArrowRight"){
      e.preventDefault(); advance();
    }
    return;
  }
  if(!startScreen.classList.contains("hidden")){
    if(e.key==="Enter"){ e.preventDefault(); startRound(); }
  } else if(!resultsScreen.classList.contains("hidden")){
    if(e.key==="Enter" && (!document.activeElement || document.activeElement.id!=="lbInitials")){ e.preventDefault(); startRound(); }
  }
});

/* ---------- init ---------- */
(function(){
  let sd; try{ sd = localStorage.getItem('rollcall_diff'); }catch(e){}
  if(sd && ["mainstream","mixed","deepcut"].includes(sd)){
    diff = sd;
    $("diffSeg").querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.diff===diff));
  }
  let slg; try{ slg = localStorage.getItem('rollcall_league'); }catch(e){}
  if(slg && ["all","nfl","nba"].includes(slg)){
    league = slg;
    $("leagueSeg").querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.league===league));
  }
  let sv; try{ sv = localStorage.getItem('rollcall_view'); }catch(e){}
  setView(sv === "desktop" ? "desktop" : "mobile");
  updatePoolNote(); updateBest();
})();
</script>
</body>
</html>
